name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"
          python-version: "3.12.13"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Check OpenAPI document is up to date
        run: uv run python scripts/export_openapi.py --check
      - name: Check documentation integrity
        run: uv run python scripts/check_docs.py
      - name: Dependency vulnerability scan (pip-audit)
        run: uv run pip-audit --ignore-vuln PYSEC-2026-1325 # ecdsa: unfixed pure-Python timing-attack CVE, no fix version exists upstream
      - name: Run pytest (with coverage gate)
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Run Vitest (with coverage gate)
        run: npm run test:coverage
      - name: Build
        run: npm run build
